# Meslektaş Backend - Spring Boot Configuration
# Strategic DDD Implementation

spring:
  application:
    name: meslektas-backend

  profiles:
    active: dev

  # JPA & Hibernate
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # Flyway Migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Servlet
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Europe/Istanbul
    default-property-inclusion: non_null

# Server
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    root: INFO
    com.meslektas: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true

# Application Specific
app:
  name: ${APP_NAME:Meslektaş}
  version: ${APP_VERSION:1.0.0}

  # JWT Configuration
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  # CORS
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

# Email (Mailgun)
mailgun:
  api-key: ${MAILGUN_API_KEY:not-configured}
  domain: ${MAILGUN_DOMAIN:not-configured}
  sender-email: ${MAILGUN_SENDER_EMAIL:noreply@meslektas.com}
  sender-name: ${MAILGUN_SENDER_NAME:Meslektaş}
  enabled: ${MAILGUN_ENABLED:true}
  base-url: ${MAILGUN_BASE_URL:https://api.eu.mailgun.net/v3}

# Firebase (Push Notifications)
firebase:
  enabled: ${FIREBASE_ENABLED:true}
  project-id: ${FIREBASE_PROJECT_ID:meslektas-dev}
  credentials-json: ${FIREBASE_CREDENTIALS_JSON:not-configured}

# OpenRouter AI Configuration
openrouter:
  api-key: ${OPENROUTER_API_KEY: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}
  base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1/chat/completions}
  model: ${OPENROUTER_MODEL:qwen/qwen3-32b}
  max-tokens: ${OPENROUTER_MAX_TOKENS:4000}
  timeout: ${OPENROUTER_TIMEOUT:30}
  temperature: ${OPENROUTER_TEMPERATURE:0.7}
  cache-enabled: ${OPENROUTER_CACHE_ENABLED:true}
  cache-ttl-minutes: ${OPENROUTER_CACHE_TTL_MINUTES:60}

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  # PostgreSQL
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/meslektas_dev}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  # OAuth2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile
          instagram:
            client-id: ${FACEBOOK_CLIENT_ID:your-instagram-client-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:your-instagram-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/{registrationId}"
            scope:
              - user_profile
        provider:
          instagram:
            authorization-uri: https://api.instagram.com/oauth/authorize
            token-uri: https://api.instagram.com/oauth/access_token
            user-info-uri: https://graph.instagram.com/me?fields=id,username
            user-name-attribute: id

# AWS (Development - LocalStack)
aws:
  access-key: ${AWS_ACCESS_KEY_ID:test}
  secret-key: ${AWS_SECRET_ACCESS_KEY:test}
  region: ${AWS_REGION:eu-central-1}
  endpoint: ${AWS_ENDPOINT:http://localhost:4566}
  s3:
    bucket: ${AWS_S3_BUCKET:meslektas-dev}
    profile-images:
      folder: users # S3 folder for profile images: users/{userId}/avatar-{uuid}.jpg
    presigned-url:
      expiration: 300 # 5 minutes
    presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:15}
    presigned-url-host: ${AWS_S3_PRESIGNED_URL_HOST:} # Override for mobile access
  cloudfront:
    domain: ${AWS_CLOUDFRONT_DOMAIN:} # Leave empty for dev (uses S3 direct URLs)
  rekognition:
    endpoint: ${AWS_ENDPOINT:http://localhost:4566}
    bucket-name: ${AWS_REKOGNITION_BUCKET:meslektas-verifications}
    face-match-threshold: ${AWS_REKOGNITION_FACE_MATCH_THRESHOLD:80.0}
    min-confidence: ${AWS_REKOGNITION_MIN_CONFIDENCE:70.0}

# File Storage
storage:
  type: ${STORAGE_TYPE:local}
  local:
    upload-dir: ${STORAGE_LOCAL_UPLOAD_DIR:./uploads}

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  # PostgreSQL
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/meslektas_prod}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl: true

  # JPA
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # OAuth2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
          instagram:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}

# AWS (Production)
aws:
  access-key: ${AWS_ACCESS_KEY_ID}
  secret-key: ${AWS_SECRET_ACCESS_KEY}
  region: ${AWS_REGION:eu-central-1}
  s3:
    bucket: ${AWS_S3_BUCKET:meslektas-prod}
    profile-images:
      folder: users # S3 folder for profile images: users/{userId}/avatar-{uuid}.jpg
    presigned-url:
      expiration: 300 # 5 minutes
  cloudfront:
    domain: ${AWS_CLOUDFRONT_DOMAIN:daw1sj0p0yrom.cloudfront.net} # CloudFront distribution domain
  rekognition:
    bucket-name: ${AWS_REKOGNITION_BUCKET:meslektas-verifications}

# File Storage
storage:
  type: s3

# Logging
logging:
  level:
    root: INFO
    com.meslektas: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  file:
    name: /var/log/meslektas/application.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# Server
server:
  error:
    include-stacktrace: never
