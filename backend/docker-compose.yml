version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: meslektas-postgres
    environment:
      POSTGRES_DB: meslektas_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - meslektas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: meslektas-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - meslektas-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LocalStack (AWS Services for Development)
  localstack:
    image: localstack/localstack:latest
    container_name: meslektas-localstack
    ports:
      - "4566:4566" # LocalStack Gateway
      - "4510-4559:4510-4559" # External services port range
    environment:
      - SERVICES=s3,rekognition,ses
      - DEBUG=0
      - DATA_DIR=/var/lib/localstack
      - AWS_DEFAULT_REGION=eu-central-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - HOSTNAME_EXTERNAL=192.168.1.101 # For mobile/external access
      - PERSISTENCE=1 # Enable data persistence
    volumes:
      - localstack_data:/var/lib/localstack
      - ./docker/localstack:/etc/localstack/init/ready.d
      # Docker socket removed for Windows compatibility
    networks:
      - meslektas-network

  # pgAdmin (Database Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: meslektas-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@meslektas.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - meslektas-network
    depends_on:
      - postgres

networks:
  meslektas-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  localstack_data:
    driver: local
  pgadmin_data:
    driver: local
