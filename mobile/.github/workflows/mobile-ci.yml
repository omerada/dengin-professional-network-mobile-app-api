# GitHub Actions CI/CD Workflow
# Meslektaş Mobile App
# Oku: mobile-development-guide/sprints/28-SPRINT-11-12.md

name: Mobile CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'both'
        type: choice
        options:
          - ios
          - android
          - both
      release:
        description: 'Release to stores'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'
  RUBY_VERSION: '3.1'

jobs:
  # =====================
  # Code Quality
  # =====================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Run ESLint
        working-directory: mobile
        run: npm run lint

      - name: Run TypeScript
        working-directory: mobile
        run: npm run typecheck

  # =====================
  # Unit Tests
  # =====================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Run tests
        working-directory: mobile
        run: npm run test -- --coverage --watchAll=false

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: mobile/coverage/lcov.info
          flags: mobile

  # =====================
  # iOS Build
  # =====================
  build-ios:
    name: Build iOS
    runs-on: macos-14
    needs: test
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'ios' ||
      github.event.inputs.platform == 'both'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: mobile

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Setup certificates
        if: github.event.inputs.release == 'true'
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          # Create keychain
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          echo "$IOS_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign

          # Import provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build iOS (Debug)
        if: github.event.inputs.release != 'true'
        working-directory: mobile
        run: |
          xcodebuild -workspace ios/MeslektasApp.xcworkspace \
            -scheme MeslektasApp \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build

      - name: Build iOS (Release)
        if: github.event.inputs.release == 'true'
        working-directory: mobile
        run: |
          bundle exec fastlane ios beta
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

  # =====================
  # Android Build
  # =====================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'android' ||
      github.event.inputs.platform == 'both'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: mobile

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Setup keystore
        if: github.event.inputs.release == 'true'
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > mobile/android/app/release.keystore
          echo "MYAPP_UPLOAD_STORE_FILE=release.keystore" >> mobile/android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> mobile/android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> mobile/android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> mobile/android/gradle.properties

      - name: Build Android (Debug)
        if: github.event.inputs.release != 'true'
        working-directory: mobile/android
        run: ./gradlew assembleDebug

      - name: Build Android (Release)
        if: github.event.inputs.release == 'true'
        working-directory: mobile
        run: bundle exec fastlane android beta
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}

      - name: Upload APK
        if: github.event.inputs.release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

  # =====================
  # E2E Tests
  # =====================
  e2e-ios:
    name: E2E Tests (iOS)
    runs-on: macos-14
    needs: build-ios
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Install Detox CLI
        run: npm install -g detox-cli

      - name: Build for Detox
        working-directory: mobile
        run: detox build --configuration ios.sim.debug

      - name: Run E2E tests
        working-directory: mobile
        run: detox test --configuration ios.sim.debug --cleanup

  # =====================
  # Notify
  # =====================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-ios, build-android]
    if: always()
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''
