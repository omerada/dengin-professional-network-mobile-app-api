# Title (50 characters max)
title: Meslektaş - Profesyonel Network

# Short Description (80 characters max)
short_description: Kimlik doğrulamalı, güvenilir profesyonel ağ platformu.

# Full Description (4000 characters max)
full_description: |
  Meslektaş, Türkiye'deki profesyoneller için tasarlanmış yeni nesil sosyal ağ platformudur. Kimlik doğrulama sistemi sayesinde gerçek profesyonellerle güvenli bir ortamda tanışın.

  🔐 KİMLİK DOĞRULAMA
  Her kullanıcı kimlik belgesi ve yüz tanıma ile doğrulanır. Spam hesaplar ve sahte profiller yok!

  👥 PROFESYONELLERLE BAĞLANTI
  Aynı sektörden veya farklı alanlardan profesyonellerle tanışın. Kariyerinizi geliştirmek için doğru kişilerle bağlantı kurun.

  💬 GERÇEK ZAMANLI MESAJLAŞMA
  Meslektaşlarınızla anında mesajlaşın. End-to-end şifreleme ile güvenli iletişim.

  📱 SOSYAL AKIŞ
  Sektörünüzle ilgili güncellemeleri paylaşın, beğenin ve yorum yapın. Trend olan konuları takip edin.

  🔔 AKILLI BİLDİRİMLER
  Önemli etkileşimlerden anında haberdar olun. Bildirim tercihlerinizi özelleştirin.

  🛡️ GÜVENLİK VE GİZLİLİK
  • KVKK uyumlu veri işleme
  • Biyometrik giriş desteği
  • Güvenli veri depolama

  ✨ ÖZELLİKLER
  • Profesyonel profil oluşturma
  • Kimlik doğrulama rozeti
  • Sektöre özel topluluklar
  • Özel mesajlaşma
  • Gönderi paylaşma ve etkileşim
  • Takipçi sistemi
  • Karanlık mod desteği

  📈 KARİYERİNİZİ GELİŞTİRİN
  Doğru bağlantılar kurun, fırsatları yakalayın ve profesyonel ağınızı genişletin.

  Hemen ücretsiz kaydolun ve Türkiye'nin en güvenilir profesyonel ağına katılın!

  Sorularınız için: destek@meslektas.com
  Web: https://meslektas.com

